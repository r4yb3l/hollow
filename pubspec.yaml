name: hollow
description: Skeleton loading screens for Flutter. Generates pixel-perfect shimmer placeholders from your real RenderObject tree.
version: 0.2.1
homepage: https://github.com/r4yb3l/hollow
repository: https://github.com/r4yb3l/hollow
issue_tracker: https://github.com/r4yb3l/hollow/issues

topics:
  - skeleton
  - shimmer
  - loading
  - placeholder
  - ui

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:

screenshots:
  - description: 'Example of a blog card skeleton loading state.'
    path: assets/screenshots/skeleton_view.png
  - description: 'The final widget rendered after loading.'
    path: assets/screenshots/final_view.png
