name: hollow
description: Pixel-perfect skeleton loading screens for Flutter. Wrap any widget in Skeleton — hollow snapshots the real render tree and shows an animated shimmer placeholder.
version: 0.1.2
homepage: https://github.com/r4yb3l/hollow
repository: https://github.com/r4yb3l/hollow
issue_tracker: https://github.com/r4yb3l/hollow/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:

screenshots:
  - description: 'Example of a blog card skeleton loading state.'
    path: assets/screenshots/skeleton_view.png
  - description: 'The final widget rendered after loading.'
    path: assets/screenshots/final_view.png
